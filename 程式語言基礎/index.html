<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👾 超級機器人程式挑戰賽 👾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    
    <!-- 左側：巨型 120px 地圖板塊 -->
    <div class="map-panel">
      <div class="section-title">🗺️ 機器人冒險地圖</div>
      <p style="margin: 0.2rem 0 1rem 0; color: #94a3b8; font-size: 0.9rem;">
        目標：避開大樹 🌲，引引導機器人 🤖 安全抵達紅旗 🏁 處！
      </p>
      
      <div class="game-map-wrapper">
        <div class="game-map" id="robot-grid">
          <!-- 這裡會動態載入 8x8 的 55px 宮格 -->
        </div>
      </div>
    </div>

    <!-- 右側：程式控制面板 -->
    <div class="control-panel">
      <div class="section-title">🎮 程式指令控制台</div>
      
      <!-- 難度選擇區 -->
      <div>
        <strong style="display: block; margin-bottom: 0.6rem; color: #cbd5e1;">🏆 選擇挑戰難度：</strong>
        <div class="difficulty-buttons" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.4rem; margin-bottom: 0.5rem;">
          <button class="btn btn-diff active" id="diff-iron" onclick="RobotGame.selectLevel('iron')">⚙️ 鐵</button>
          <button class="btn btn-diff" id="diff-bronze" onclick="RobotGame.selectLevel('bronze')">🥉 銅</button>
          <button class="btn btn-diff" id="diff-silver" onclick="RobotGame.selectLevel('silver')">🥈 銀</button>
          <button class="btn btn-diff" id="diff-gold" onclick="RobotGame.selectLevel('gold')">🥇 金</button>
          <button class="btn btn-diff" id="diff-diamond" onclick="RobotGame.selectLevel('diamond')">💎 鑽石</button>
        </div>
      </div>
      
      <!-- 小奇語音說明 -->
      <div class="mascot-bubble">
        <span class="mascot-icon">🤖</span>
        <div class="mascot-text" id="rules-text">
          「我是小奇！請點擊下方的『前進』、『左轉』或『右轉』按鈕來編排程式步驟。點擊『🚀 出發！』我就會開始移動。注意不要撞到樹木喔！」
        </div>
        <button class="speech-btn" style="margin-left: auto;" onclick="SpeechReader.speak(document.getElementById('rules-text').innerText, this)">📢</button>
      </div>

      <div>
        <strong style="display: block; margin-bottom: 0.6rem; color: #cbd5e1;">1. 選擇你的程式指令：</strong>
        <div class="command-buttons">
          <button class="btn btn-command-forward" onclick="RobotGame.addCommand('forward')">前進 ⬆️</button>
          <button class="btn btn-command-left" onclick="RobotGame.addCommand('left')">左轉 ↺</button>
          <button class="btn btn-command-right" onclick="RobotGame.addCommand('right')">右轉 ↻</button>
        </div>
      </div>

      <div>
        <strong style="display: block; margin-bottom: 0.6rem; color: #cbd5e1;">2. 你的程式指令排程（點選 × 可刪除）：</strong>
        <div class="command-list" id="robot-cmd-list">
          <!-- 指令將動態載入至此 -->
        </div>
      </div>

      <div class="game-actions">
        <button class="btn btn-run" onclick="RobotGame.runProgram()">🚀 出發！</button>
        <button class="btn btn-reset" onclick="RobotGame.resetGame()">↩️ 重來</button>
      </div>
    </div>

  </div>

  <footer>
    © 2026 超級機器人程式挑戰賽 🚀 啟發自 STEAM 教育與互動遊戲
  </footer>

  <script src="app.js"></script>
</body>
</html>
